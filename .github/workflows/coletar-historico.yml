name: Coletar histórico de pontuações
on:
  schedule:
    - cron: '15 13 * * *'   # 10h15 horário de Brasília (UTC-3)
    - cron: '0 18 * * *'    # 15h00 horário de Brasília (UTC-3)
    - cron: '0 23 * * *'    # 20h00 horário de Brasília (UTC-3)
  workflow_dispatch:
jobs:
  coletar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Coletar pontuações e disparar alertas
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.CDV_PAINEL_TOKEN }}
        run: node coletar.js
      - name: Salvar arquivos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add historico.json alertas.json
          git diff --staged --quiet || git commit -m "chore: atualiza histórico $(date -u +'%Y-%m-%d %H:%M')"
          git push
